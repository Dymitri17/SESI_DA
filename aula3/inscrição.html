<html>
<head>
<meta charset="UTF-8">
<title>Inscrição TechImperion</title>
</head>
<body>

<form>

<fieldset>
<legend>Dados Pessoais</legend>

<label>Nome:</label>
<input type="text" required><br>

<label>Sobrenome:</label>
<input type="text" required><br>

<label>CPF:</label>
<input type="number" required><br>

<label>RG:</label>
<input type="number" required><br>

<label>Data de nascimento:</label>
<input type="date" required><br>

<label>E-mail:</label>
<input type="email" required><br>

<label>Senha:</label>
<input type="password" required><br>

<label>Telefone:</label>
<input type="tel" required><br>

<label>Foto:</label>
<input type="file"><br>

</fieldset>

<fieldset>
<legend>Dados Profissionais</legend>

<label>Empresa:</label>
<input type="text"><br>

<label>Cargo:</label>
<input type="text"><br>

<label>Área:</label>
<input type="text"><br>

<label>Site:</label>
<input type="url"><br>

</fieldset>

<fieldset>
<legend>Participação</legend>

<label>Dias:</label><br>
<input type="checkbox"> Dia 1
<input type="checkbox"> Dia 2
<input type="checkbox"> Dia 3
<input type="checkbox"> Dia 4
<input type="checkbox"> Dia 5
<br>

<label>Trilha:</label><br>
<input type="radio" name="trilha"> IA
<input type="radio" name="trilha"> Robótica<br>

<label>Alimentação:</label>
<select>
<option>Normal</option>
<option>Vegetariano</option>
<option>Vegano</option>
</select><br>

<label>Cor do crachá:</label>
<input type="color"><br>

<label>Nível de interesse:</label>
<input type="range"><br>

<label>Observações:</label><br>
<textarea></textarea>

</fieldset>

<button type="submit">Enviar</button>

</form>

</body>
</html>
